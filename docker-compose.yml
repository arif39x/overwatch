version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: overwatch-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:15-alpine
    container_name: overwatch-postgres
    environment:
      POSTGRES_USER: overwatch
      POSTGRES_PASSWORD: password
      POSTGRES_DB: overwatch
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U overwatch -d overwatch"]
      interval: 5s
      timeout: 3s
      retries: 5

